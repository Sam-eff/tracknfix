<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TracknFix – Inventory, sales, repairs and customers for Nigerian tech shops." />
    <meta name="theme-color" content="#f8fafc" />
    <meta property="og:title" content="TracknFix" />
    <meta property="og:description" content="Inventory, sales, repairs and customer management for Nigerian tech shops." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    />
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("theme");
          const isDark = theme === "dark";
          if (isDark) {
            document.documentElement.classList.add("dark");
          }
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        } catch {
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <title>TracknFix</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
