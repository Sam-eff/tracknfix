server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    # Serve React static assets
    root /usr/share/nginx/html;
    index index.html index.htm;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
    
    # Try files for React Router logic
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api to backend Django Gunicorn server
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /admin to backend Django Gunicorn server
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Django Static Files (though Whitenoise handles this via proxy_pass if not found here)
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve user uploads efficiently without touching Django
    location /media/ {
        alias /usr/share/nginx/media/;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
